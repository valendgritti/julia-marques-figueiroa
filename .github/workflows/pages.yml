name: Publicar site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Aguardar indexação do schema no TinaCloud
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if npm run build:cms; then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "O schema continuou incompatível após 5 tentativas."
              exit 1
            fi

            delay=$((attempt * 20))
            echo "TinaCloud ainda não indexou a branch ${NEXT_PUBLIC_TINA_BRANCH}. Nova tentativa em ${delay}s."
            sleep "$delay"
          done
        env:
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          NEXT_PUBLIC_TINA_BRANCH: ${{ github.ref_name }}
          TINA_PUBLIC_BASE_PATH: julia-marques-figueiroa

      - name: Gerar site estático
        run: npm run build:site
        env:
          SITE_PATH_PREFIX: /julia-marques-figueiroa/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
